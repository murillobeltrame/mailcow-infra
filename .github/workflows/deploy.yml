name: Deploy Nive Mail

on:
  push:
    branches: [master, main]
    paths:
      - "branding/**"
      - "deploy/**"
      - "webmail/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      command:
        description: Comando deploy.mjs
        required: true
        default: branding
        type: choice
        options:
          - branding
          - update
          - dns
          - dns-dkim
          - validate
          - setup
          - full
          - tune
          - ssl
          - ssl-fix
          - reset-admin
          - bootstrap
          - migrate-email
          - disable-sogo
          - enable-sogo
          - test-api
          - webmail

concurrency:
  group: mailcow-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Mesmo modelo do sistemaloja: runner no VPS Hostinger (sem SSH da nuvem GitHub).
    runs-on: [self-hosted, Linux, vps-hostinger]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: deploy/package-lock.json

      - name: Install dependencies
        working-directory: deploy
        run: npm ci

      - name: Create deploy/.env.deploy from secrets
        working-directory: deploy
        run: node ci-write-env.mjs
        env:
          DEPLOY_MODE: local_vps
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PASS: ${{ secrets.VPS_SSH_PASS }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          MAILCOW_DIR: ${{ secrets.MAILCOW_DIR }}
          MAILCOW_HOSTNAME: ${{ secrets.MAILCOW_HOSTNAME }}
          MAILCOW_TZ: ${{ secrets.MAILCOW_TZ }}
          MAIL_DOMAIN: ${{ secrets.MAIL_DOMAIN }}
          MAILCOW_IPV4_NETWORK: ${{ secrets.MAILCOW_IPV4_NETWORK }}
          MAILCOW_PASS: ${{ secrets.MAILCOW_PASS }}
          MAILCOW_API_KEY: ${{ secrets.MAILCOW_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EXTRA_MAIL_DOMAIN: ${{ secrets.EXTRA_MAIL_DOMAIN }}
          EXTRA_CLOUDFLARE_ZONE_ID: ${{ secrets.EXTRA_CLOUDFLARE_ZONE_ID }}
          GIT_REPO: ${{ secrets.GIT_REPO }}

      - name: Definir e executar deploy
        working-directory: deploy
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node deploy.mjs "${{ github.event.inputs.command }}"
            exit 0
          fi

          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          CHANGED="$(git diff --name-only "$BASE" HEAD 2>/dev/null || true)"
          echo "Arquivos alterados:"
          echo "$CHANGED"

          RUN_WEBMAIL=false
          RUN_BRANDING=false
          echo "$CHANGED" | grep -q '^webmail/' && RUN_WEBMAIL=true || true
          echo "$CHANGED" | grep -qE '^(branding/|deploy/)' && RUN_BRANDING=true || true

          if [ "$RUN_WEBMAIL" = false ] && [ "$RUN_BRANDING" = false ]; then
            RUN_BRANDING=true
          fi

          if [ "$RUN_WEBMAIL" = true ]; then
            echo "==> Deploy webmail (webmail/ alterado)"
            node deploy.mjs webmail
          fi
          if [ "$RUN_BRANDING" = true ]; then
            echo "==> Deploy branding (branding/ ou deploy/ alterado)"
            node deploy.mjs branding
          fi

          echo "==> Pos-deploy: sincronizar API Mailcow"
          set -a && source .env.deploy && set +a
          bash sync-api-key.sh
        env:
          DEPLOY_MODE: local_vps
          DEPLOY_DKIM_WAIT_SEC: ${{ vars.DEPLOY_DKIM_WAIT_SEC || '120' }}
